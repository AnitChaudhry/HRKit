name: Publish to PyPI

# Fires on every v* tag push. Builds the wheel + sdist and uploads to PyPI
# using PyPI Trusted Publishing (GitHub OIDC), so no long-lived PyPI token is
# stored in this public repository.
#
# To release:
#   1. Bump version in pyproject.toml
#   2. git commit -m "Release vX.Y.Z"
#   3. git tag vX.Y.Z && git push --tags
#   4. This workflow runs automatically.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hrkit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate metadata
        run: twine check dist/*

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
