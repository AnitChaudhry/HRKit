          <h1>HR-Kit — Open-Source Local HR Software</h1>
          <p>HR-Kit is a free, open-source HR application that runs entirely on a single laptop. Built with Python and SQLite, it ships with 11 HR modules (employees, recruitment kanban, leave, payroll, performance, onboarding, exits, documents, attendance, departments, roles), a bring-your-own-key AI assistant, and Composio integrations for Gmail, Calendar, Drive, Slack, and 200+ other apps.</p>
          <p>This page is the HR-Kit marketing site and uses JavaScript for animations. The HR app itself is a separate Python package you install on your own machine — there is no hosted version. Visit the <a href="https://github.com/AnitChaudhry/HRKit">GitHub repository</a> for source code and installation instructions.</p>
          <h2>Install</h2>
          <pre>pip install hrkit
hrkit init my-workspace
hrkit serve</pre>
