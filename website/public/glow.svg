<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="HR-Kit animated glow mark">
  <defs>
    <radialGradient id="g0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#1e1b4b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#08090a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#08090a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="big-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="text-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="400" height="400" fill="#08090a"/>

  <!-- Two pulsing color blobs that orbit slowly -->
  <g filter="url(#big-blur)">
    <circle cx="200" cy="200" r="120" fill="url(#g0)">
      <animate attributeName="r" values="110;150;110" dur="6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="180" r="80" fill="url(#g1)" opacity="0.85">
      <animate attributeName="r" values="70;100;70" dur="5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360 200 200" to="0 200 200" dur="18s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Pulsing accent ring -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="#a5b4fc" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="110;145;110" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.05;0.55" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Centerpiece logo -->
  <text x="200" y="225"
        text-anchor="middle"
        font-family="'Instrument Serif', 'Times New Roman', serif"
        font-style="italic"
        font-size="220"
        fill="url(#textGrad)"
        filter="url(#text-glow)">H</text>
</svg>
