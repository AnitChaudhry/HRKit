<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="HR-Kit logo">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="55%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#08090a"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bgGlow)"/>

  <!-- Pulsing coral ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#ef4444" stroke-width="1.4" opacity="0.55">
    <animate attributeName="r" values="20;26;20" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.05;0.55" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <text x="50%" y="50%"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="'Instrument Serif', 'Times New Roman', serif"
        font-style="italic"
        font-size="44"
        fill="url(#textGrad)"
        filter="url(#softGlow)">H</text>
</svg>
